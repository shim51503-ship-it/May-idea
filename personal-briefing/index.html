<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人简讯 · Daily Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============ 0. 设计变量 ============ */
:root{
  --paper:#F6F3EC;
  --paper-deep:#EDE8DC;
  --ink:#1B201D;
  --ink-soft:#4A4C46;
  --muted:#83806F;
  --line:#DCD5C4;
  --card:#FFFFFF;
  --teal:#1F5C50;
  --teal-deep:#123B33;
  --teal-pale:#E4EEE9;
  --amber:#BD7F33;
  --amber-pale:#F6E8D3;
  --rose:#9C4A3C;
  --shadow:0 1px 2px rgba(27,32,29,.04), 0 8px 24px rgba(27,32,29,.05);
  --radius:14px;
}
[data-theme="dark"]{
  --paper:#151916;
  --paper-deep:#0F1210;
  --ink:#ECE7DA;
  --ink-soft:#C7C2B3;
  --muted:#8C8878;
  --line:#2B302B;
  --card:#1B201C;
  --teal:#5FB39E;
  --teal-deep:#0F1210;
  --teal-pale:#1C2B26;
  --amber:#D9A35E;
  --amber-pale:#2B2417;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:"Noto Sans SC",-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  transition:background .25s,color .25s;
}
h1,h2,h3{font-family:"Noto Serif SC",serif;margin:0;}
a{color:inherit;text-decoration:none;}
.mono{font-family:"JetBrains Mono",monospace;}
.wrap{max-width:1180px;margin:0 auto;padding:0 28px;}
:focus-visible{outline:2px solid var(--teal);outline-offset:2px;border-radius:4px;}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important;}}

/* ============ 1. 顶部导航 ============ */
.topnav{
  position:sticky;top:0;z-index:40;
  background:var(--paper);
  border-bottom:1px solid var(--line);
}
.topnav-inner{
  display:flex;align-items:center;gap:28px;
  height:60px;
}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;white-space:nowrap;}
.brand-mark{
  width:26px;height:26px;border-radius:7px;background:var(--teal);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:"Noto Serif SC",serif;font-weight:700;font-size:13px;flex-shrink:0;
}
.navlinks{display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none;}
.navlinks::-webkit-scrollbar{display:none;}
.navlinks button{
  border:none;background:transparent;color:var(--ink-soft);
  font-family:inherit;font-size:13.5px;padding:8px 13px;border-radius:8px;
  cursor:pointer;white-space:nowrap;transition:background .15s,color .15s;
}
.navlinks button:hover{background:var(--paper-deep);color:var(--ink);}
.navlinks button.active{background:var(--teal-pale);color:var(--teal);font-weight:600;}
.navtools{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.icon-btn{
  width:34px;height:34px;border-radius:9px;border:1px solid var(--line);
  background:var(--card);display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--ink-soft);transition:border-color .15s,color .15s;
}
.icon-btn:hover{border-color:var(--teal);color:var(--teal);}

/* ============ 2. HERO ============ */
.hero{
  position:relative;
  background:
    radial-gradient(circle at 14% 18%, rgba(95,179,158,.16), transparent 42%),
    radial-gradient(circle at 82% 78%, rgba(189,127,51,.14), transparent 46%),
    linear-gradient(150deg, var(--teal-deep) 0%, #0E1A17 62%, #0A1311 100%);
  color:#F2EFE6;
  overflow:hidden;
  padding:64px 0 0;
}
.hero::before{
  content:"";position:absolute;inset:0;opacity:.5;pointer-events:none;
  background-image:
    repeating-linear-gradient(90deg, rgba(255,255,255,.035) 0 1px, transparent 1px 64px),
    repeating-linear-gradient(0deg, rgba(255,255,255,.035) 0 1px, transparent 1px 64px);
}
.hero-grid{
  position:relative;z-index:1;
  display:grid;grid-template-columns:1.5fr 1fr;gap:40px;
  padding-bottom:56px;align-items:start;
}
.eyebrow{
  font-family:"JetBrains Mono",monospace;font-size:11.5px;letter-spacing:.18em;
  color:#D9A35E;text-transform:uppercase;margin-bottom:18px;display:block;
}
.hero h1{
  font-size:clamp(40px,6vw,70px);line-height:1.02;font-weight:700;
  color:#FAF8F2;letter-spacing:-.01em;
}
.hero h1 .accent{color:#7FCBB3;font-style:italic;}
.hero p.lede{
  font-size:16.5px;color:#C9C5B6;margin:18px 0 30px;max-width:480px;line-height:1.6;
}
.hero-actions{display:flex;gap:12px;}
.btn{
  font-family:inherit;font-size:14px;font-weight:600;padding:12px 22px;
  border-radius:10px;cursor:pointer;border:1px solid transparent;transition:all .15s;
}
.btn-primary{background:#7FCBB3;color:#0E1A17;}
.btn-primary:hover{background:#9adcc6;}
.btn-ghost{background:transparent;border-color:rgba(242,239,230,.28);color:#F2EFE6;}
.btn-ghost:hover{border-color:#F2EFE6;}

/* hero 右侧卡片 */
.hero-cards{display:flex;flex-direction:column;gap:14px;}
.glass-card{
  background:rgba(246,243,236,.07);
  border:1px solid rgba(242,239,230,.14);
  border-radius:var(--radius);
  padding:18px 20px;
  backdrop-filter:blur(6px);
}
.weather-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.weather-temp{font-size:26px;font-weight:700;font-family:"Noto Serif SC",serif;}
.weather-desc{font-size:12.5px;color:#C9C5B6;margin-bottom:12px;}
.weather-row{display:flex;gap:8px;}
.weather-input{
  flex:1;background:rgba(0,0,0,.18);border:1px solid rgba(242,239,230,.18);
  color:#F2EFE6;border-radius:8px;padding:9px 11px;font-size:13px;font-family:inherit;
}
.weather-input::placeholder{color:#8C8878;}
.weather-btn{
  background:#7FCBB3;border:none;color:#0E1A17;font-weight:600;font-size:13px;
  padding:9px 14px;border-radius:8px;cursor:pointer;white-space:nowrap;
}
.weather-btn:hover{background:#9adcc6;}

.issue-card .issue-label{
  font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.14em;
  color:#7FCBB3;text-transform:uppercase;
}
.issue-card h3{font-size:22px;color:#FAF8F2;margin:6px 0 10px;}
.issue-card p{font-size:13px;line-height:1.7;color:#C9C5B6;margin:0 0 16px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-cell{
  background:rgba(0,0,0,.16);border-radius:8px;padding:9px 12px;
}
.stat-cell .num{font-family:"Noto Serif SC",serif;font-size:19px;font-weight:700;color:#FAF8F2;}
.stat-cell .lbl{font-size:11px;color:#9D9A8B;}

@media (max-width: 880px){
  .hero-grid{grid-template-columns:1fr;}
}

/* ============ 3. 控制条：期数 + 搜索 ============ */
.controlbar{
  background:var(--paper);border-bottom:1px solid var(--line);
  padding:22px 0;
}
.controlbar-inner{display:flex;gap:16px;flex-wrap:wrap;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:12px;color:var(--muted);font-weight:600;}
.field select, .field input{
  font-family:inherit;font-size:14px;padding:10px 13px;border-radius:9px;
  border:1px solid var(--line);background:var(--card);color:var(--ink);min-width:200px;
}
.field.grow{flex:1;}
.field.grow input{width:100%;min-width:0;}

/* ============ 4. 主体布局 ============ */
.main{padding:34px 0 80px;}
.layout{display:grid;grid-template-columns:300px 1fr;gap:26px;align-items:start;}
@media (max-width:900px){.layout{grid-template-columns:1fr;}}

.focus-card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px;box-shadow:var(--shadow);position:sticky;top:80px;
}
.tag{
  display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;font-family:"JetBrains Mono",monospace;
}
.tag.focus-tag{color:var(--amber);}
.focus-card h3{font-size:18px;line-height:1.4;margin:10px 0 12px;}
.focus-card p{font-size:13.5px;line-height:1.75;color:var(--ink-soft);margin:0;}

.section{margin-bottom:38px;}
.section-head{
  display:flex;align-items:baseline;justify-content:space-between;
  margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--line);
}
.section-head .tag{color:var(--teal);}
.section-head h2{font-size:21px;margin-top:4px;}
.count-pill{
  background:var(--teal-pale);color:var(--teal);font-weight:700;font-size:13px;
  padding:4px 11px;border-radius:99px;
}

.item{
  display:flex;gap:14px;padding:18px 0;border-bottom:1px solid var(--line);
}
.item:last-child{border-bottom:none;}
.item-body{flex:1;min-width:0;}
.item-date{font-family:"JetBrains Mono",monospace;font-size:11.5px;color:var(--muted);}
.item-title{font-size:16px;font-weight:700;margin:5px 0 8px;line-height:1.45;}
.item-summary{font-size:13.5px;line-height:1.7;color:var(--ink-soft);margin:0 0 10px;}
.item-importance{
  display:flex;gap:8px;font-size:12.5px;line-height:1.6;color:var(--ink-soft);
  background:var(--amber-pale);border-radius:8px;padding:9px 11px;margin-bottom:10px;
}
.item-importance b{color:var(--amber);flex-shrink:0;font-weight:700;}
.item-source{font-size:12.5px;font-weight:600;color:var(--teal);}
.star-btn{
  flex-shrink:0;width:32px;height:32px;border-radius:9px;border:1px solid var(--line);
  background:var(--card);color:var(--muted);cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.star-btn:hover{border-color:var(--amber);color:var(--amber);}
.star-btn.active{background:var(--amber-pale);border-color:var(--amber);color:var(--amber);}

/* placeholder dashed style for github / youtube provenance note */
.note-line{
  font-size:12px;color:var(--muted);margin-top:-4px;margin-bottom:18px;
}

/* youtube 频道卡片 */
.yt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
.yt-card{
  border:1px solid var(--line);border-radius:12px;padding:16px;background:var(--card);
  box-shadow:var(--shadow);
}
.yt-card .yt-channel{font-weight:700;font-size:14.5px;margin-bottom:6px;color:var(--teal);}
.yt-card .yt-desc{font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:10px;}
.yt-card .yt-video{font-size:13px;color:var(--ink-soft);line-height:1.6;}
.yt-card .yt-video a{color:var(--teal);font-weight:600;text-decoration:underline;}

.hidden{display:none!important;}
.empty-state{padding:40px 20px;text-align:center;color:var(--muted);font-size:14px;}

footer{
  border-top:1px solid var(--line);padding:26px 0;text-align:center;
  font-size:12px;color:var(--muted);
}
</style>
</head>

        </div>
      </div>
    </div>
  </div>
</header>

<div class="controlbar">
  <div class="wrap controlbar-inner">
    <div class="field">
      <label for="issueSelect">期数</label>
      <select id="issueSelect">

      </select>
    </div>
    <div class="field grow">
      <label for="searchInput">搜索</label>
      <input id="searchInput" type="text" placeholder="关键词、项目、来源">
    </div>
  </div>
</div>

<main class="main" id="main">
  <div class="wrap layout">
    <aside class="focus-card">
      <span class="tag focus-tag">Focus</span>
      <h3 id="focusTitle"></h3>
      <p id="focusBody"></p>

</main>

/* ===================== 渲染逻辑 ===================== */
const sectionsRoot = document.getElementById('sectionsRoot');
const catLabel = {ai:'AI', github:'GitHub', finance:'金融', china:'中国', world:'世界'};

function renderAll(data){
  document.getElementById('focusTitle').textContent = data.focus.title;
  document.getElementById('focusBody').textContent = data.focus.body;

  const githubCount = data.categories.find(c=>c.id==='github')?.items.length || 0;
  const totalNews = data.categories.reduce((sum,c)=>sum+c.items.length, 0);
  document.getElementById('statCats').textContent = data.categories.length;
  document.getElementById('statNews').textContent = totalNews;
  document.getElementById('statProjects').textContent = githubCount;
  document.getElementById('issueSummary').textContent = data.focus.body.slice(0,72) + '…';

  sectionsRoot.innerHTML = '';
  data.categories.forEach(cat=>{
    const sec = document.createElement('section');
    sec.className = 'section';
    sec.dataset.cat = cat.id;
    sec.innerHTML = `
      <div class="section-head">
        <div>
          <span class="tag">${catLabel[cat.id]||cat.id}</span>
          <h2>${cat.name}</h2>
        </div>
        <span class="count-pill">${cat.items.length}</span>
      </div>
      <div class="item-list"></div>
    `;
    const list = sec.querySelector('.item-list');
    cat.items.forEach((it,idx)=>{
      const row = document.createElement('div');
      row.className = 'item';
      row.dataset.search = (it.title+' '+it.summary+' '+(it.source||'')).toLowerCase();
      row.innerHTML = `
        <div class="item-body">
          <div class="item-date">${it.date||''}</div>
          <div class="item-title">${it.title}</div>
          <p class="item-summary">${it.summary}</p>
          ${it.importance ? `<div class="item-importance"><b>重要性</b><span>${it.importance}</span></div>`:''}
          ${it.source ? `<div class="item-source">${it.source}</div>`:''}
        </div>
        <button class="star-btn" aria-label="收藏" data-key="${cat.id}-${idx}">★</button>
      `;
      list.appendChild(row);
    });
    sectionsRoot.appendChild(sec);
  });

  // YouTube 区块
  const ytSec = document.createElement('section');
  ytSec.className = 'section';
  ytSec.dataset.cat = 'youtube';
  ytSec.innerHTML = `
    <div class="section-head">
      <div><span class="tag">YouTube</span><h2>关注博主更新</h2></div>
      <span class="count-pill">${data.youtube.length}</span>
    </div>
    <p class="note-line">具体更新内容以频道实际发布为准，建议点击频道名直接前往确认最新一期。</p>
    <div class="yt-grid"></div>
  `;
  const ytGrid = ytSec.querySelector('.yt-grid');
  data.youtube.forEach(yt=>{
    const card = document.createElement('div');
    card.className = 'yt-card';
    card.dataset.search = (yt.channel+' '+yt.desc+' '+yt.video).toLowerCase();
    card.innerHTML = `
      <div class="yt-channel">${yt.channel}</div>
      <div class="yt-desc">${yt.desc}</div>
      <div class="yt-video">${yt.url ? `<a href="${yt.url}" target="_blank" rel="noopener">${yt.video}</a>` : yt.video}</div>
      <div class="item-date" style="margin-top:8px;">${yt.date||''}</div>
    `;
    ytGrid.appendChild(card);
  });
  sectionsRoot.appendChild(ytSec);

  // 收藏按钮（仅本次会话内记忆，刷新后重置）
  document.querySelectorAll('.star-btn').forEach(btn=>{
    btn.addEventListener('click', ()=> btn.classList.toggle('active'));
  });
}
async function loadData(){
  let data = FALLBACK_DATA;
  try{
    const res = await fetch('./data.json', {cache:'no-store'});
    if(res.ok){
      data = await res.json();
    }
  }catch(err){
    console.warn('未找到 data.json 或加载失败，使用内置示例数据：', err);
  }
  renderAll(data);
}
loadData();

/* ===================== 导航 / 分类筛选 ===================== */
document.getElementById('navlinks').addEventListener('click', e=>{
  const btn = e.target.closest('button');
  if(!btn) return;
  document.querySelectorAll('#navlinks button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const cat = btn.dataset.cat;
  document.querySelectorAll('.section').forEach(sec=>{
    sec.classList.toggle('hidden', cat!=='all' && sec.dataset.cat!==cat);
  });
  if(cat!=='all'){
    document.querySelector(`.section[data-cat="${cat}"]`)?.scrollIntoView({behavior:'smooth', block:'start'});
  }
});

/* ===================== 搜索 ===================== */
document.getElementById('searchInput').addEventListener('input', e=>{
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll('.item, .yt-card').forEach(row=>{
    row.classList.toggle('hidden', q && !row.dataset.search.includes(q));
  });
});

document.getElementById('themeToggle').addEventListener('click', ()=>{
  const cur = document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme', cur==='dark' ? 'light' : 'dark');
});

/* ===================== 天气（Open-Meteo，免key，浏览器端直接调用） ===================== */
async function loadWeather(query){
  try{
    const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=zh`).then(r=>r.json());
    if(!geo.results || !geo.results.length){
      document.getElementById('wDesc').textContent = '找不到该地点，请换个写法';
      return;
    }
    const {latitude, longitude, name, country} = geo.results[0];
    const wx = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min&timezone=auto`).then(r=>r.json());
    const c = wx.current, d = wx.daily;
    document.getElementById('wTemp').textContent = Math.round(c.temperature_2m)+'°';
    document.getElementById('wRange').textContent = `${Math.round(d.temperature_2m_min[0])}°–${Math.round(d.temperature_2m_max[0])}°`;
    document.getElementById('wDesc').textContent = `${weatherCodeToText(c.weather_code)} · 体感 ${Math.round(c.apparent_temperature)}° · 风速 ${Math.round(c.wind_speed_10m)} km/h`;
    document.getElementById('wLocationInput').value = `${name}・${country}`;
  }catch(err){
    document.getElementById('wDesc').textContent = '天气获取失败，请检查网络后点击更新';
  }
}
function weatherCodeToText(code){
  const map = {0:'晴',1:'大致晴朗',2:'多云',3:'阴',45:'雾',48:'冻雾',51:'小雨',53:'中雨',55:'大雨',
    61:'小雨',63:'中雨',65:'大雨',71:'小雪',73:'中雪',75:'大雪',80:'阵雨',81:'阵雨',82:'强阵雨',
    95:'雷暴',96:'雷暴伴冰雹',99:'强雷暴伴冰雹'};
  return map[code] || '天气数据';
}
document.getElementById('wUpdateBtn').addEventListener('click', ()=>{
  loadWeather(document.getElementById('wLocationInput').value);
});
loadWeather(document.getElementById('wLocationInput').value);
